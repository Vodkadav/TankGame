<!--
  Injected into the exported index.html's <head> via the Web export preset's
  html/head_include (export_presets.cfg [preset.1.options]).

  Fixes the WASM canvas rendering larger than the visible browser panel (arcade
  embed clipped the HUD + arena edges). canvasResizePolicy=1 makes the canvas
  follow its CSS box instead of the raw window/iframe size; this CSS pins that
  box to the panel/viewport.
-->
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; }
  #canvas { width: 100%; height: 100%; max-width: 100%; max-height: 100%; }
</style>
