name = "tankgame-worker"
main = "src/index.ts"
compatibility_date = "2026-05-21"
# Required by @sentry/cloudflare (AsyncLocalStorage).
compatibility_flags = ["nodejs_compat"]

# SENTRY_DSN_WORKER is a Worker SECRET, set at deploy time (M0-T6):
#   wrangler secret put SENTRY_DSN_WORKER
# It is intentionally NOT declared as a [vars] binding — a var and a secret of the
# same name collide ("Binding name already in use"). Tests inject a stub value via
# miniflare bindings (see vitest.config.ts).

# Request-budget alarm (M3-T11): a daily cron reads Durable Object usage and warns Sentry at 80%
# of the free-tier budget (ADR-0005 §4). CF_API_TOKEN (read-only Analytics) is a deploy-time secret;
# absent, the scheduled run is a safe no-op.
[triggers]
crons = ["0 6 * * *"]

# One MatchRoom Durable Object per lobby code (M3). SQLite-backed storage is the current
# default for new DO classes and supports the hibernatable-WebSocket API the room relies on.
[[durable_objects.bindings]]
name = "MATCH_ROOM"
class_name = "MatchRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MatchRoom"]

# Maps a shareable lobby code → its MatchRoom (M3-T4). The id is a namespace handle, not a
# secret — safe to commit. Tests use a local Miniflare KV; this id is for the deployed Worker.
[[kv_namespaces]]
binding = "LOBBY_KV"
id = "ac6434bc4bb6481ba24acdd41542f1c6"
