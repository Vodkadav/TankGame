name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            client:
              - 'client/**'
            worker:
              - 'server/worker/**'
              - 'shared/protocol/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint workflows
        uses: raven-actions/actionlint@v2

  # Pure-C# xUnit tests that need no Godot runtime: NetArchTest layer rules and the
  # Domain/GameLogic contract + unit tests. Fast; the in-engine GoDotTest scene tests
  # run in godot-tests below.
  dotnet-tests:
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: NetArchTest layer rules
        run: dotnet test client/tests/Architecture/TankGame.Tests.Architecture.csproj -c Debug
      - name: Domain tests
        run: dotnet test client/tests/Domain/TankGame.Tests.Domain.csproj -c Debug
      - name: GameLogic tests
        run: dotnet test client/tests/GameLogic/TankGame.Tests.GameLogic.csproj -c Debug
      - name: Infrastructure tests
        run: dotnet test client/tests/Infrastructure/TankGame.Tests.Infrastructure.csproj -c Debug

  # Compiles the client (fast-fail compile gate) and runs the GoDotTest scene
  # tests headless inside a real Godot process via the --run-tests entry in
  # Bootstrap.cs. --quit-on-finish makes GoDotTest set the process exit code from
  # the result, so a failing test fails the job. The full Android APK export runs
  # only on merge to main (deploy.yml) — too slow for every PR.
  godot-tests:
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: true
          include-templates: true
      - name: Build client
        run: dotnet build client/TankGame.csproj -c Debug
      - name: Import resources
        run: godot --headless --path client --import
      - name: Run GoDotTest scene tests
        run: godot --headless --path client --run-tests --quit-on-finish

  worker-test:
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: server/worker/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: server/worker
      - name: Test
        run: pnpm test
        working-directory: server/worker
