name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# NOTE: the GoDotTest scene tests (client/tests/TankGame.Tests.csproj:
# MainSceneTests / LocaleTests / SentryInitTests) are NOT run here yet. They live
# in a separate assembly that Godot does not load at runtime, and that assembly
# references TankGame (so the game project cannot reference it back). Running them
# headless needs a test-layout change (single project + a --run-tests entry, the
# Chickensoft pattern) — tracked as a follow-up. NetArchTest below DOES run.

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            client:
              - 'client/**'
            worker:
              - 'server/worker/**'
              - 'shared/protocol/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint workflows
        uses: raven-actions/actionlint@v2

  arch-test:
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: NetArchTest layer rules
        run: dotnet test client/tests/Architecture/TankGame.Tests.Architecture.csproj -c Debug

  client-build:
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0
          use-dotnet: true
          include-templates: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Generate Android debug keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore debug.keystore -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" -validity 9999 -deststoretype pkcs12
      - name: Export Android debug APK
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: ${{ github.workspace }}/debug.keystore
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
        run: |
          mkdir -p build
          godot --headless --path client --import
          godot --headless --path client --export-debug "Android" "${{ github.workspace }}/build/tankgame.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: client-apk
          path: build/tankgame.apk
          if-no-files-found: error

  worker-test:
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: server/worker/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: server/worker
      - name: Test
        run: pnpm test
        working-directory: server/worker
