name: Deploy

# Production only — runs on merge to main (and manual dispatch). PRs never deploy,
# so there are no live side effects until a change lands on main. Both targets are
# cheap and idempotent, so we deploy unconditionally rather than path-filtering
# (a docs/workflow-only merge still refreshes the landing-page build SHA).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  # The Android export below is expensive (installs the full Android SDK + NDK and
  # runs a headless Godot export, ~15 min). Only rebuild the APK when client code
  # actually changes — a docs/worker/workflow-only merge must not trigger it. The
  # cheap Cloudflare deploys stay unconditional so the landing-page SHA still
  # refreshes on every merge.
  changes:
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            client:
              - 'client/**'

  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: server/worker/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: server/worker
      # Deploy first: with SENTRY_DSN_WORKER no longer a [vars] binding, this
      # clears any stale var of that name, so the secret upload below cannot
      # collide with it.
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: server/worker
          command: deploy
      - name: Set Worker secret
        working-directory: server/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          SENTRY_DSN_WORKER: ${{ secrets.SENTRY_DSN_WORKER }}
        run: |
          printf '%s' "$SENTRY_DSN_WORKER" | pnpm exec wrangler secret put SENTRY_DSN_WORKER

  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build landing page
        run: |
          mkdir -p public
          {
            echo '<!doctype html><html lang="en"><head><meta charset="utf-8">'
            echo '<title>TankGame</title></head><body>'
            echo '<h1>TankGame</h1>'
            echo "<p>Build: ${GITHUB_SHA}</p>"
            echo "<p><a href=\"https://github.com/${GITHUB_REPOSITORY}/releases/latest\">Latest Android APK</a></p>"
            echo '</body></html>'
          } > public/index.html
      - name: Ensure the Pages project exists (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          PROJECT: ${{ secrets.CF_PAGES_PROJECT }}
        run: |
          # create-on-first-run; a no-op (non-zero, ignored) once it exists.
          npx --yes wrangler@3 pages project create "$PROJECT" --production-branch=main || true
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy public --project-name=${{ secrets.CF_PAGES_PROJECT }} --branch=main

  # Builds the Android debug APK via the .NET→Android Gradle custom-build path and
  # publishes it to a rolling "canary" GitHub Release (the landing page links to
  # releases/latest). Debug-signed with a generated standard debug keystore, so no
  # signing secret is needed. arm64-v8a only — C#/.NET Android supports arm64/x86_64
  # (the preset drops armeabi-v7a, which .NET cannot target).
  release-apk:
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "build-tools;35.0.1" \
            "platforms;android-35" \
            "ndk;28.1.13356709" \
            "cmake;3.10.2.4988404"
      - name: Set up Godot (.NET) + export templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: true
          include-templates: true
      - name: Generate debug keystore
        run: |
          mkdir -p "$HOME/.android"
          "$JAVA_HOME/bin/keytool" -keyalg RSA -genkeypair \
            -alias androiddebugkey -keypass android \
            -keystore "$HOME/.android/debug.keystore" -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" -validity 9999
      - name: Configure Godot Android editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.6.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/debug_keystore = "$HOME/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF
      - name: Import resources
        run: godot --headless --path client --import
      - name: Export debug APK
        run: |
          mkdir -p build
          godot --headless --path client \
            --install-android-build-template \
            --export-debug "Android" "$GITHUB_WORKSPACE/build/tankgame-debug.apk"
      - name: Verify APK
        run: |
          test -f build/tankgame-debug.apk
          size=$(stat -c%s build/tankgame-debug.apk)
          echo "APK size: ${size} bytes"
          test "$size" -gt 1000000
          unzip -l build/tankgame-debug.apk | grep -q AndroidManifest.xml
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: canary
          name: Canary (latest main)
          body: Automated Android debug build from main @ ${{ github.sha }}.
          files: build/tankgame-debug.apk
          make_latest: true
          fail_on_unmatched_files: true

  smoke-test:
    needs: deploy-worker
    if: needs.deploy-worker.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Worker /healthz responds 200
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' https://tankgame-worker.vodkadav.workers.dev/healthz)
          echo "healthz -> $code"
          test "$code" = "200"
