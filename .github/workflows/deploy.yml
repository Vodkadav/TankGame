name: Deploy

# Production only — runs on merge to main (and manual dispatch). PRs never deploy,
# so there are no live side effects until a change lands on main. Both targets are
# cheap and idempotent, so we deploy unconditionally rather than path-filtering
# (a docs/workflow-only merge still refreshes the landing-page build SHA).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: server/worker/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: server/worker
      # Deploy first: with SENTRY_DSN_WORKER no longer a [vars] binding, this
      # clears any stale var of that name, so the secret upload below cannot
      # collide with it.
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: server/worker
          command: deploy
      - name: Set Worker secret
        working-directory: server/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          SENTRY_DSN_WORKER: ${{ secrets.SENTRY_DSN_WORKER }}
        run: |
          printf '%s' "$SENTRY_DSN_WORKER" | pnpm exec wrangler secret put SENTRY_DSN_WORKER

  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build landing page
        run: |
          mkdir -p public
          {
            echo '<!doctype html><html lang="en"><head><meta charset="utf-8">'
            echo '<title>TankGame</title></head><body>'
            echo '<h1>TankGame</h1>'
            echo "<p>Build: ${GITHUB_SHA}</p>"
            echo "<p><a href=\"https://github.com/${GITHUB_REPOSITORY}/releases/latest\">Latest Android APK</a></p>"
            echo '</body></html>'
          } > public/index.html
      - name: Ensure the Pages project exists (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          PROJECT: ${{ secrets.CF_PAGES_PROJECT }}
        run: |
          # create-on-first-run; a no-op (non-zero, ignored) once it exists.
          npx --yes wrangler@3 pages project create "$PROJECT" --production-branch=main || true
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy public --project-name=${{ secrets.CF_PAGES_PROJECT }} --branch=main

  # NOTE: the Android APK GitHub Release is deferred until the .NET→Android Gradle
  # export path is set up (see the client-build note in ci.yml). Until then no APK
  # is published; the landing page's "Latest APK" link will 404 until the first
  # release exists.

  smoke-test:
    needs: deploy-worker
    if: needs.deploy-worker.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Worker /healthz responds 200
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' https://tankgame-worker.vodkadav.workers.dev/healthz)
          echo "healthz -> $code"
          test "$code" = "200"
